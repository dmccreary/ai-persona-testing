# Intelligent Textbook — MkDocs Material configuration.
# Generated by the init-textbook skill. Customize as the book grows.
# Use the book-installer skill to add features incrementally
# (math, mascot, slides, learning graph viewer, etc.).

site_name: 'AI Persona Testing'
site_description: 'An interactive intelligent textbook covering methods and best practices for testing AI personas.'
site_author: 'Dan McCreary'
site_url: 'https://dmccreary.github.io/ai-persona-testing/'

# Hooks — runs local Python before/after page processing.
# `plugins/social_override.py` injects og:title, og:description, og:image,
# og:type, og:url, and twitter:* meta tags on every page using each page's
# frontmatter `title:` / `description:` / `image:` (falling back to the site-
# wide values and `img/cover.png`). This is the Cairo-free path to social-
# media previews — works without `pip install "mkdocs-material[imaging]"`.
# If the `social` plugin below is ever enabled, the same hook also rewrites
# its auto-generated `/assets/images/social/...` URLs to point at the
# declared cover image. Verify the result with `bk-check-social-cover`.
hooks:
  - plugins/social_override.py

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/dmccreary/ai-persona-testing'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

# Navigation
# IMPORTANT: do NOT add `navigation.tabs` — these books use side navigation
# optimized for wide landscape screens.
nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Chapters:
      - List of Chapters: chapters/index.md
      - 1. AI-Powered Customer Research Foundations: chapters/01-ai-customer-research/index.md
      - 2. Research Design and Evidence Quality: chapters/02-research-design-evidence/index.md
      - 3. AI Capabilities, Limitations, and Bias: chapters/03-ai-limits-bias/index.md
      - 4. Responsible AI, Privacy, and Governance: chapters/04-responsible-ai-governance/index.md
      - 5. Building Complete Customer Personas: chapters/05-customer-personas/index.md
      - 6. Persona Motivations, Behaviors, and Evidence: chapters/06-persona-behavior-evidence/index.md
      - 7. Customer Segmentation and Persona Archetypes: chapters/07-segmentation-archetypes/index.md
      - 8. Jobs-to-Be-Done and Customer Journeys: chapters/08-jobs-customer-journeys/index.md
      - 9. Persona Consistency, Validation, and Reuse: chapters/09-persona-quality-reuse/index.md
      - 10. Prompt Engineering Foundations: chapters/10-prompt-engineering/index.md
      - 11. Structured Prompts and Reliable Outputs: chapters/11-structured-prompts/index.md
      - 12. Prompt Testing and Research Dialogue: chapters/12-prompt-testing-dialogue/index.md
      - 13. Designing AI Agents and Expert Roles: chapters/13-ai-agents-expert-roles/index.md
      - 14. Multi-Agent Workflows, Debate, and Consensus: chapters/14-multi-agent-orchestration/index.md
      - 15. Moderation Risks and Brand Strategy: chapters/15-moderation-brand-strategy/index.md
      - 16. Evaluating Marketing Assets and Messaging: chapters/16-marketing-asset-evaluation/index.md
      - 17. Evaluation Rubrics, Scoring, and Evidence: chapters/17-rubrics-scoring-evidence/index.md
      - 18. Marketing Metrics and Pattern Analysis: chapters/18-marketing-metrics-analysis/index.md
      - 19. Risk-Based Recommendations and Knowledge Graphs: chapters/19-risk-knowledge-graphs/index.md
      - 20. Automation, Reporting, and Capstone Systems: chapters/20-automation-reporting-capstone/index.md

  - Learning Graph:
      - Introduction: learning-graph/index.md
      - Course Description Assessment: learning-graph/course-description-assessment.md
      # Generated by learning-graph-generator skill:
      - Concept Enumeration: learning-graph/concept-list.md
      - Concept Taxonomy: learning-graph/concept-taxonomy.md
      - Graph Quality Analysis: learning-graph/quality-metrics.md
      - Taxonomy Distribution: learning-graph/taxonomy-distribution.md

  - MicroSims:
      - List of MicroSims: sims/index.md
      - Learning Graph Viewer: sims/graph-viewer/index.md

  - License: license.md
  - Contact: contact.md

# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'blue grey'
    accent: 'deep orange'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true
  #     auto_caption: false
  #     caption_position: bottom
  #     skip_classes:
  #       - mascot-admonition-img   # keep mascot poses out of the lightbox gallery

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css

# Custom JavaScript — uncomment once a corresponding file exists
# extra_javascript:
#   - js/extra.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'AI Persona Testing'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
